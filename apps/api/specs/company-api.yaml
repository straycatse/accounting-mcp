    standardSettlementDetails:
      type: object
      additionalProperties: false
      required:
        - date
        - sumBaseCurrency
      properties:
        date:
          type: string
          format: date
          description: The date of the settlement
        sumBaseCurrency:
          type: number
          format: decimal
          description: The settlement amount in base currency
      example:
        date: 2024-10-15
        sumBaseCurrency: 15.5
    paymentServiceFeeSettlementDetails:
      type: object
      required:
        - date
        - sumBaseCurrency
        - vatScheme
      properties:
        date:
          type: string
          format: date
          description: The date of the settlement
        sumBaseCurrency:
          type: number
          format: decimal
          description: The settlement amount in base currency. Must be greater than zero.
        vatScheme:
          type: string
          enum:
            - domestic
            - eu
            - nonEu
            - vatExempt
          description: |
            The VAT scheme for the payment service fee. Determines how VAT is handled in the bookkeeping.

            - `domestic` — No reverse charge VAT. The fee is booked as a domestic expense.

            - `eu` — EU reverse charge. The fee is booked with reverse charge VAT (output VAT on account 2645, input VAT on account 2614).

            - `nonEu` — Non-EU reverse charge. Same VAT treatment as EU but booked to a different expense account.

            - `vatExempt` — VAT exempt. The fee is booked as a general administrative expense with no VAT.
      example:
        date: 2024-10-15
        sumBaseCurrency: 25
        vatScheme: eu
    invoiceSettlementRead:
      type: object
      readOnly: true
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the settlement
          readOnly: true
        invoiceId:
          type: string
          format: uuid
          description: The unique identifier of the invoice this settlement belongs to
          readOnly: true
        type:
          type: string
          readOnly: true
          enum:
            - currency
            - bankFee
            - badDebt
            - balanceAdjustment
            - paymentServiceFee
          description: |
            The type of the settlement.

            - Currency adjustments are for changes in exchange rates. Currency gain or currency loss is reflected in `sumBaseCurrency` being positive or negative respectively.

            - Bank fees are for charges from banks or payment providers.

            - Bad debts are for uncollectible invoices.

            - Balance adjustments are for correcting discrepancies on invoices without affecting bookkeeping.

            - Payment service fees are for charges from payment service providers (e.g. Stripe). Available for Swedish companies only. Supports different VAT schemes for domestic, EU, non-EU, and VAT-exempt transactions.
        invoiceSettlementDetails:
          oneOf:
            - $ref: "#/components/schemas/standardSettlementDetails"
            - $ref: "#/components/schemas/paymentServiceFeeSettlementDetails"
          discriminator:
            propertyName: reason
            mapping:
              currency: "#/components/schemas/standardSettlementDetails"
              bankFee: "#/components/schemas/standardSettlementDetails"
              badDebt: "#/components/schemas/standardSettlementDetails"
              balanceAdjustment: "#/components/schemas/standardSettlementDetails"
              paymentServiceFee: "#/components/schemas/paymentServiceFeeSettlementDetails"
          description: The settlement details specific to the settlement type
        journalEntryRef:
          type: object
          nullable: true
          readOnly: true
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
      example:
        id: c529df79-eb7f-5ef0-a8dc-c2b71f953554
        invoiceId: a419cf69-db6f-4de9-992c-b1a60942a443
        type: bankFee
        invoiceSettlementDetails:
          date: 2024-10-15
          sumBaseCurrency: 15.5
        journalEntryRef:
          id: 55c899c5-82b2-4a09-899e-9dc03342b5dc
    invoiceSettlementWrite:
      type: object
      required:
        - type
        - invoiceSettlementDetails
      properties:
        type:
          type: string
          enum:
            - currency
            - bankFee
            - paymentServiceFee
          description: |
            The type of the settlement.

            - Currency adjustments are for changes in exchange rates. Currency gain or currency loss is reflected in `sumBaseCurrency` being positive or negative respectively.

            - Bank fees are for charges from banks or payment providers.

            - Payment service fees are for charges from payment service providers (e.g. Stripe). Available for Swedish companies only. Requires `vatScheme` in the settlement details.
        invoiceSettlementDetails:
          oneOf:
            - $ref: "#/components/schemas/standardSettlementDetails"
            - $ref: "#/components/schemas/paymentServiceFeeSettlementDetails"
          discriminator:
            propertyName: reason
            mapping:
              currency: "#/components/schemas/standardSettlementDetails"
              bankFee: "#/components/schemas/standardSettlementDetails"
              paymentServiceFee: "#/components/schemas/paymentServiceFeeSettlementDetails"
          description: The settlement details specific to the settlement type
      example:
        type: bankFee
        invoiceSettlementDetails:
          date: 2024-10-15
          sumBaseCurrency: 15.5
