openapi: 3.0.3
info:
  version: "1.0"
  title: Company API
  description: The Bokio Company API containing all resources for company tenant.
  termsOfService: https://docs.bokio.se/page/terms/
  contact:
    name: Bokio
    url: https://docs.bokio.se
    email: support@bokio.se
servers:
  - url: https://api.bokio.se/v1
    description: Bokio API
    x-bokio-api: true
security:
  - tokenAuth: []
tags:
  - name: bank-payments
    description: Operations for creating and reading bank payments
  - name: chart-of-accounts
    description: Operations for managing chart of accounts
  - name: company-information
    description: Operations for managing company information
  - name: credit-notes
    description: Operations for managing credit notes
  - name: customers
    description: Operations for managing customer data
  - name: fiscal-years
    description: Operations for managing fiscal years
  - name: invoices
    description: Operations for managing invoices
  - name: items
    description: Operations for managing inventory items
  - name: journal-entries
    description: Operations for managing accounting journal entries
  - name: sie-files
    description: Operations for managing SIE files
  - name: supplier-invoices
    description: Operations for managing supplier invoices
  - name: suppliers
    description: Operations for managing suppliers
  - name: tag-groups
    description: Operations for managing tag groups and tags
  - name: uploads
    description: Operations for managing file uploads
externalDocs:
  url: https://docs.bokio.se
  description: Read the API Documentation
paths:
  /companies/{companyId}/bank-payments:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
    post:
      tags:
        - bank-payments
      summary: Create a bank payment
      description: |
        Creates a new bank payment for the company. Payment will be created in the Bokio system.
        In order to submit the transaction to the bank, the signatory for the account needs to login to the Bokio application and sign the payment with their BankID.
        This is different from the transactions imported through a connected bank in Bokio.

        **Scope:** `bank-payments:write`
      operationId: post-bank-payment
      requestBody:
        description: Post the necessary fields for the API to create a new bank payment.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/bank-payment"
            examples:
              Account transfer payment:
                value:
                  amount: 1200
                  paymentDate: 2025-08-25
                  ownNote: Rent payment
                  recipientRef:
                    kind: transfer
                    recipientName: Property Management Co
                    recipientReference: RENT-2025-08
                    clearingNumber: "5011"
                    accountNumber: "0379101"
              Bankgiro payment:
                value:
                  amount: 2500.5
                  paymentDate: 2025-08-25
                  ownNote: Monthly service payment
                  recipientRef:
                    kind: bankgiro
                    recipientName: Tech Solutions Ltd
                    bankgiroNumber: 123-4567
                    ocr: "123456789012345"
      responses:
        "200":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bank-payment"
              examples:
                Payment created:
                  value:
                    id: 835ba700-b306-4bd9-8447-59207b6b0002
                    status: readyToSign
                    amount: 1200
                    createdDateTime: 2025-08-25T08:15:00Z
                    paymentDate: 2025-08-25
                    ownNote: Rent payment
                    recipientRef:
                      kind: transfer
                      recipientName: Property Management Co
                      recipientReference: RENT-2025-08
                      clearingNumber: "5011"
                      accountNumber: "0379101"
        "400":
          description: Missing required information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: validation-error
                    message: Validation failed with 2 errors
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
                    errors:
                      - field: "#/amount"
                        message: The amount field is required
                      - field: "#/recipientRef"
                        message: The recipientRef field is required
      security:
        - tokenAuth: []
    get:
      tags:
        - bank-payments
      summary: Get bank payments
      description: |-
        Get all bank payments for the company that were created by the integration.
        **Scope:** `bank-payments:read-limited`
      operationId: get-bank-payments-limited
      parameters:
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page
          schema:
            type: integer
            format: int32
            default: 25
            maximum: 100
        - name: query
          in: query
          required: false
          description: |
            Optional query to filter the data set with supported fields listed below and [available operations](filtering).

            | Field                | Type        |
            | -------------------- | ----------- |
            | amount               | number      |
            | status               | string      |
            | paymentDate          | date-time   |
            | createdDateTime      | date-time   |
          schema:
            type: string
          example: amount==1200.00
      responses:
        "200":
          description: Bank payments found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/pagedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/bank-payment"
        "400":
          description: Invalid query filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                invalid-filter:
                  value:
                    code: validation-error
                    message: The provided filter 'amount===oops' is not valid. Please check the format of the query parameter
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
                    errors:
                      - field: query
                        message: The provided filter 'amount===oops' is not valid. Please check the format of the query parameter
      security:
        - tokenAuth: []
  /companies/{companyId}/bank-payments/{bankPaymentId}:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: bankPaymentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        example: 835ba700-b306-4bd9-8447-59207b6b0002
        description: Unique identifier of the bank payment
    get:
      tags:
        - bank-payments
      summary: Get a bank payment created by the integration
      description: |
        Retrieve the information of the bank payment with the matching bankPaymentId.

        **Scope:** `bank-payments:read-limited`
      operationId: get-bank-payments-bank-payment-id
      responses:
        "200":
          description: Bank payment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/bank-payment"
              examples:
                bank payment found:
                  value:
                    id: 835ba700-b306-4bd9-8447-59207b6b0002
                    status: readyToSign
                    createdDateTime: 2025-08-25T08:15:00Z
                    amount: 1500
                    paymentDate: 2025-08-25
                    ownNote: "Payment for invoice #INV-2025-001"
                    recipientRef:
                      kind: transfer
                      recipientName: Property Management Co
                      recipientReference: RENT-2025-08
                      clearingNumber: "8000"
                      accountNumber: "1234567890"
        "404":
          description: Bank payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: not-found
                    message: Bank payment not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
  /companies/{companyId}/bank-payments/bulk:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
    post:
      tags:
        - bank-payments
      summary: Bulk create bank payments
      description: |
        Creates multiple bank payments for the company in a single request. Up to 100 payments can be created per request.

        The operation is atomic — if any payment fails validation, no payments are created.

        **Scope:** `bank-payments:write`
      operationId: post-bank-payments-bulk
      requestBody:
        description: List of bank payments to create.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/bulk-create-bank-payments-request"
            examples:
              Two payments:
                value:
                  payments:
                    - amount: 1200
                      paymentDate: 2025-08-25
                      ownNote: Rent payment
                      recipientRef:
                        kind: transfer
                        recipientName: Property Management Co
                        recipientReference: RENT-2025-08
                        clearingNumber: "5011"
                        accountNumber: "0379101"
                    - amount: 2500.5
                      paymentDate: 2025-08-25
                      ownNote: Service payment
                      recipientRef:
                        kind: bankgiro
                        recipientName: Tech Solutions Ltd
                        bankgiroNumber: 123-4567
                        ocr: "123456789012345"
      responses:
        "200":
          description: All payments created successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/bank-payment"
              examples:
                All succeeded:
                  value:
                    - id: 835ba700-b306-4bd9-8447-59207b6b0002
                      status: readyToSign
                      amount: 1200
                      createdDateTime: 2025-08-25T08:15:00Z
                      paymentDate: 2025-08-25
                      ownNote: Rent payment
                      recipientRef:
                        kind: transfer
                        recipientName: Property Management Co
                        recipientReference: RENT-2025-08
                        clearingNumber: "5011"
                        accountNumber: "0379101"
                    - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      status: readyToSign
                      amount: 2500.5
                      createdDateTime: 2025-08-25T08:15:00Z
                      paymentDate: 2025-08-25
                      ownNote: Service payment
                      recipientRef:
                        kind: bankgiro
                        recipientName: Tech Solutions Ltd
                        bankgiroNumber: 123-4567
                        ocr: "123456789012345"
        "400":
          description: |
            Validation failed. No payments were created.
            Errors include the payment index in the field path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Payment validation errors:
                  value:
                    code: validation-error
                    message: Validation failed with 2 errors
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
                    errors:
                      - field: "#/payments/0/recipientRef/bankgiroNumber"
                        message: The bankgiro number is invalid
                      - field: "#/payments/1/amount"
                        message: The amount must be greater than 0
                Too many payments:
                  value:
                    code: validation-error
                    message: Validation failed with 1 error
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
                    errors:
                      - field: "#/payments"
                        message: The number of payments must not exceed 100
      security:
        - tokenAuth: []
  /companies/{companyId}/chart-of-accounts:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
    get:
      tags:
        - chart-of-accounts
      summary: Get chart of accounts
      description: |
        Retrieves the complete chart of accounts for the company, merging bookkeeping accounts with their associated money account details.

        **Scope:** `chart-of-accounts:read`
      operationId: get-chart-of-accounts
      parameters:
        - name: query
          in: query
          required: false
          description: |
            Optional query to filter the data set with supported fields listed below and [available operations](filtering).

            | Field                | Type        |
            | -------------------- | ----------- |
            | account              | number      |
            | name                 | string      |
            | accountType          | string    |
          schema:
            type: string
          example: account==3950
      responses:
        "200":
          description: Chart of accounts retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/account"
              examples:
                Chart of accounts:
                  value:
                    - account: 1930
                      name: Företagskonto / Affärskonto
                      accountType: basePlanAccount
                    - account: 3001
                      name: Försäljning varor, 25% moms
                      accountType: basePlanAccount
                    - account: 8001
                      name: Custom Account
                      accountType: customAccount
        "404":
          description: Company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
      security:
        - tokenAuth: []
        - access_token:
            - chart-of-accounts:read
  /companies/{companyId}/chart-of-accounts/{account}:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: account
        in: path
        required: true
        description: The number of the account
        schema:
          type: integer
          format: int32
    get:
      tags:
        - chart-of-accounts
      summary: Get specific account
      description: |
        Retrieves details of a specific account from the chart of accounts using the account number.

        **Scope:** `chart-of-accounts:read`
      operationId: get-account-with-number
      responses:
        "200":
          description: Account retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/accountWithDetails"
              examples:
                Account:
                  value:
                    account: 1930
                    name: Företagskonto / Affärskonto
                    accountType: basePlanAccount
                    accountBalance: 15000.75
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
      security:
        - tokenAuth: []
        - access_token:
            - chart-of-accounts:read
  /companies/{companyId}/company-information:
    parameters:
      - name: companyId
        in: path
        required: true
        description: The unique identifier for the company
        schema:
          type: string
          format: uuid
          example: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
    get:
      tags:
        - company-information
      summary: Retrieve company information
      description: |
        Retrieve the information of the company.

        **Scope:** `company-information:read`
      operationId: get-company-information-with-id
      responses:
        "200":
          description: Company information
          content:
            application/json:
              schema:
                type: object
                properties:
                  companyInformation:
                    $ref: "#/components/schemas/companyInformation"
        "404":
          description: Company not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              example:
                code: not-found
                message: The requested resource with value 9b408943-7a1e-47ac-85a7-ac52b2c210d3 was not found
                bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
  /companies/{companyId}/credit-notes:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
    get:
      tags:
        - credit-notes
      summary: List credit notes
      description: |
        Returns a list of credit notes for the company.

        **Scope:** `credit-notes:read`
      operationId: list-credit-notes-v1
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: Number of items per page
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: query
          in: query
          required: false
          description: |
            Optional query to filter the data set with supported fields listed below and [available operations](filtering).
            View documentation for filtering on metatdata [here](metadata).

            | Field                | Type        |
            | -------------------- | ----------- |
            | type                 | string      |
            | customerRef          | string      |
            | orderNumberReference | string      |
            | projectReference     | string      |
            | buyerReference       | string      |
            | contractReference    | string      |
            | currency             | string      |
            | totalAmount          | number      |
            | status               | string      |
            | invoiceDate          | date        |
            | dueDate              | date        |
            | metadata             | string      |
          schema:
            type: string
          example: dueDate==2024-10-10&&currency==SEK
      responses:
        "200":
          description: List of credit notes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/pagedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/creditNote"
      security:
        - tokenAuth: []
        - access_token:
            - credit-notes:read
  /companies/{companyId}/credit-notes/{creditNoteId}:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: creditNoteId
        in: path
        required: true
        description: Unique identifier of the credit note
        schema:
          type: string
          format: uuid
        example: b529df79-eb7f-5ef0-a8dc-c2b71f953554
    get:
      tags:
        - credit-notes
      summary: Get a credit note
      description: |
        Retrieves a specific credit note by its ID.

        **Scope:** `credit-notes:read`
      operationId: get-credit-note-v1
      responses:
        "200":
          description: Credit note found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/creditNote"
        "404":
          description: Credit note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                notFound:
                  summary: Credit note not found
                  value:
                    code: not-found
                    message: Credit note not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
        - access_token:
            - credit-notes:read
    put:
      tags:
        - credit-notes
      summary: Update a credit note
      description: |
        Updates an existing credit note. Only draft credit notes can be updated.

        **Scope:** `credit-notes:write`
      operationId: update-credit-note-v1
      requestBody:
        description: Updated credit note information
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/creditNote"
            examples:
              creditNote:
                summary: Example credit note update
                value:
                  id: b529df79-eb7f-5ef0-a8dc-c2b71f953554
                  orderNumberReference: ORD-5678
                  projectReference: PROJ-001
                  buyerReference: BUYER-123
                  contractReference: CONTRACT-456
                  currency: SEK
                  currencyRate: 1
                  creditDate: 2024-10-15
                  dueDate: 2024-11-15
                  lineItems:
                    - id: 1
                      itemRef:
                        id: 55c899c5-82b2-47fa-9c51-e35fc9b26443
                        description: Product 1
                      description: Product 1 (Updated)
                      itemType: salesItem
                      productType: goods
                      quantity: 3
                      unitPrice: 100
                      taxRate: 25
                  deliveryAddress:
                    line1: Delivery Street 15
                    line2: Floor 2
                    city: Stockholm
                    postalCode: 111 11
                    country: SE
      responses:
        "200":
          description: Credit note updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/creditNote"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                validationError:
                  summary: Validation error
                  value:
                    code: validation-error
                    message: One or more validation errors occurred
                    errors:
                      - field: "#/creditDate"
                        message: The credit date field is required
        "404":
          description: Credit note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
      security:
        - tokenAuth: []
        - access_token:
            - credit-notes:write
    delete:
      tags:
        - credit-notes
      summary: Delete a credit note
      description: |
        Deletes a draft credit note. Only draft credit notes can be deleted.

        **Scope:** `credit-notes:write`
      operationId: delete-credit-note-with-id
      security:
        - tokenAuth: []
        - access_token:
            - credit-notes:write
      responses:
        "204":
          description: Credit note deleted successfully
        "400":
          description: Credit note cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                CreditNoteCannotBeDeleted:
                  value:
                    code: operation-not-allowed
                    message: Credit note with value b529df79-eb7f-5ef0-a8dc-c2b71f953554 cannot be deleted as it is not in draft status
                    bokioErrorId: 4d408943-7a1e-47ac-85a7-ac52b2c210d3
  /companies/{companyId}/credit-notes/{creditNoteId}/publish:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: creditNoteId
        in: path
        required: true
        description: Unique identifier of the credit note
        schema:
          type: string
          format: uuid
        example: b529df79-eb7f-5ef0-a8dc-c2b71f953554
    post:
      tags:
        - credit-notes
      summary: Publish a credit note
      description: |
        Publishes a draft credit note, making it official and immutable.

        **Scope:** `credit-notes:write`
      operationId: publish-credit-note-v1
      responses:
        "200":
          description: Credit note published successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/creditNote"
        "400":
          description: Credit note cannot be published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
        "404":
          description: Credit note not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
      security:
        - tokenAuth: []
        - access_token:
            - credit-notes:write
  /companies/{companyId}/credit-notes/{creditNoteId}/record:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: creditNoteId
        in: path
        required: true
        description: Unique identifier of the credit note
        schema:
          type: string
          format: uuid
        example: b529df79-eb7f-5ef0-a8dc-c2b71f953554
    post:
      tags:
        - credit-notes
      summary: Record credit note
      description: |
        Record a credit note.

        **Scope:** `credit-notes:write`
      operationId: record-credit-note-with-id
      security:
        - tokenAuth: []
        - access_token:
            - credit-notes:write
      responses:
        "200":
          description: Credit note recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/creditNote"
              examples:
                creditNoteRecorded:
                  summary: Credit note recorded successfully
                  value:
                    id: b529df79-eb7f-5ef0-a8dc-c2b71f953554
                    status: published
                    invoiceNumber: CN-2024-001
                    invoiceRef:
                      id: a419cf69-db6f-4de9-992c-b1a60942a443
                      invoiceNumber: IN-2024-001
                    customerRef:
                      id: 55c899c5-82b2-47fa-9c51-e35fc9b26443
                      name: customer 1
                    contactDetailRef:
                      id: d3b07384-d9a0-4c9b-8b3a-6e1f2a5c8d4e
                      email: contact@customer1.com
                      phone: "+46701234567"
                    currency: SEK
                    currencyRate: 1
                    totalAmount: 200
                    totalTax: 50
                    paidAmount: 0
                    creditDate: 2024-10-15
