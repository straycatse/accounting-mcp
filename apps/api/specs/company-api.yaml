      type: object
      nullable: true
      title: invoiceTaxReduction
      description: |
        Tax reduction details for the invoice.

        **Ownership restriction:** Only the integration that created the invoice can manage tax reduction data. Other integrations can read tax reduction data, but personal numbers will be masked (see `personalNumber`).
