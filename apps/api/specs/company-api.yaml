        example: b2c3d4e5-f6a7-8901-bcde-f12345678901
    put:
      tags:
        - tag-groups
      summary: "[Preview] Update a tag in a tag group"
      description: |
        Update the name of an existing tag within a tag group.

        The company must have the Tags feature enabled in their price plan.

        **Preview:** This endpoint is in preview and may change or be removed before general availability.
        [Read the full preview policy](/reference/versioning#preview)

        **Scope:** `tags:write`
      operationId: put-tag-group-tag
      requestBody:
        description: The tag fields to update.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/tagValueWrite"
            examples:
              Updated tag:
                value:
                  name: Project Alpha (Renamed)
      responses:
        "200":
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tagValue"
              examples:
                Tag updated:
                  value:
                    id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                    name: Project Alpha (Renamed)
        "400":
          description: |
            Validation error. Possible reasons:
            - Missing required fields
            - Duplicate tag name within the tag group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: validation-error
                    message: A tag with this name already exists in the tag group
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
        "403":
          description: |
            Forbidden. The company's price plan does not include API access, or the integration does not have the required scope.

            See [price plan requirements](price-plan-requirements#handling-403-responses) for details on how to handle this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Price plan restriction:
                  value:
                    error: price_plan_feature_required
                    message: This feature requires Integrations (API) or a Plus plan
                    details:
                      requiredFeature: PublicApi
                      availableIn:
                        - Plus
                        - Business
                      availableAsAddonIn:
                        - Premium
                      isAvailableInTrial: true
                      isInTrial: false
        "404":
          description: Tag or tag group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: not-found
                    message: Tag not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
    delete:
      tags:
        - tag-groups
      summary: "[Preview] Delete a tag from a tag group"
      description: |
        Delete a specific tag from a tag group.

        Deletion will fail if the tag is currently in use on any journal entries.

        The company must have the Tags feature enabled in their price plan.

        **Preview:** This endpoint is in preview and may change or be removed before general availability.
        [Read the full preview policy](/reference/versioning#preview)

        **Scope:** `tags:write`
      operationId: delete-tag-group-tag
      responses:
        "204":
          description: Tag deleted successfully
        "400":
          description: Tag cannot be deleted because it is in use on journal entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: validation-error
                    message: Cannot delete tag because it is in use
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
        "403":
          description: |
            Forbidden. The company's price plan does not include API access, or the integration does not have the required scope.

            See [price plan requirements](price-plan-requirements#handling-403-responses) for details on how to handle this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Price plan restriction:
                  value:
                    error: price_plan_feature_required
                    message: This feature requires Integrations (API) or a Plus plan
                    details:
                      requiredFeature: PublicApi
                      availableIn:
                        - Plus
                        - Business
                      availableAsAddonIn:
                        - Premium
                      isAvailableInTrial: true
                      isInTrial: false
      security:
        - tokenAuth: []
  /companies/{companyId}/uploads:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
    post:
      tags:
        - uploads
      summary: Add an upload
      description: |
        Add an upload to bokio in the form of an image or pdf. One file can be uploaded per request. The request must be **multi-part MIME**.

        #### Sample request for uploading a file using multipart MIME
        ```
        POST http://api.bokio.se/companies/{companyId}/uploads
        Content-Type: multipart/form-data; boundary=----FormBoundary7MA4YWxkTrZu0gW
        Authorization: Bearer <token>

        ------FormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="File"; filename="receipt.png"
        Content-Type: image/png

        < ./receipt.png

        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="journalEntryId"

        835ba700-b306-4bd9-8447-59207b6b0002

        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="description"

        Description for the upload

        ------FormBoundary7MA4YWxkTrZu0gW--
        ```

        **Scope:** `uploads:write`
      operationId: add-upload
      parameters:
        - name: Content-Type
          in: header
          required: true
          description: Content type of the request
          schema:
            type: string
          example: multipart/form-data;boundary=JLQPFBPUP0
      requestBody:
        description: File and information for upload
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                description:
                  type: string
                  description: Description of the upload. If left empty, the file name will be used.
                  example: Receipt for invoice 1234
                journalEntryId:
                  type: string
                  format: uuid
                  description: The journal entry id to attach the upload to
                  example: 835ba700-b306-4bd9-8447-59207b6b0002
              required:
                - file
      responses:
        "200":
          description: Successfully added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/upload"
              examples:
                upload added:
                  value:
                    id: a419cf69-db6f-4de9-992c-b1a60942a443
                    description: example.png
                    contentType: img/png
                    journalEntryId: 835ba700-b306-4bd9-8447-59207b6b0002
        "400":
          description: Invalid file data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    message: Validation failed with 1 error
                    code: validation-error
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
                    errors:
                      - field: "#/file"
                        message: Invalid file type. Only application/pdf, image/jpeg and image/png files are allowed.
      security:
        - tokenAuth: []
    get:
      tags:
        - uploads
      summary: Get uploads
      description: |-
        Get all uploads for the company. Use the query parameters to filter and navigate through the results.
        **Scope:** `uploads:read`
      operationId: get-uploads
      parameters:
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: integer
            format: int32
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of items per page
          schema:
            type: integer
            format: int32
            default: 25
        - name: query
          in: query
          required: false
          description: |
            Optional query to filter the data set with supported fields listed below and [available operations](filtering).

            | Field                     | Type        |
            | ------------------------- | ----------- |
            | description               | string      |
            | journalEntryId            | string      |
          schema:
            type: string
          example: description~Receipt for invoice 1234
      responses:
        "200":
          description: uploads found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/pagedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/upload"
      security:
        - tokenAuth: []
  /companies/{companyId}/uploads/{uploadId}:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: uploadId
        in: path
        required: true
        description: Unique identifier of the upload
        schema:
          type: string
          format: uuid
        example: a419cf69-db6f-4de9-992c-b1a60942a443
    get:
      tags:
        - uploads
      summary: Get an upload
      description: |
        Retrieve the information of the upload with the matching uploadId.

        **Scope:** `uploads:read`
      operationId: get-upload
      responses:
        "200":
          description: upload found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/upload"
              examples:
                upload found:
                  value:
                    id: a419cf69-db6f-4de9-992c-b1a60942a443
                    description: example.png
                    contentType: img/png
                    journalEntryId: 835ba700-b306-4bd9-8447-59207b6b0002
        "404":
          description: upload not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: not-found
                    message: upload not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
  /companies/{companyId}/uploads/{uploadId}/download:
    parameters:
      - name: companyId
        in: path
        required: true
        description: Unique identifier of the company
        schema:
          type: string
          format: uuid
        example: ea9ee4dd-fae3-4aec-a7db-6fc9cc1f8135
      - name: uploadId
        in: path
        required: true
        description: Unique identifier of the upload
        schema:
          type: string
          format: uuid
        example: a419cf69-db6f-4de9-992c-b1a60942a443
    get:
      tags:
        - uploads
      summary: Download file data for an upload
      description: |
        Retrieve the file data of the upload with the matching uploadId.

        **Scope:** `uploads:read`
      operationId: download-upload
      responses:
        "200":
          description: Upload file found
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Upload not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/apiError"
              examples:
                Error:
                  value:
                    code: not-found
                    message: upload not found
                    bokioErrorId: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
      security:
        - tokenAuth: []
components:
  securitySchemes:
    tokenAuth:
      type: http
      scheme: bearer
    access_token:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /token
          scopes: {}
        authorizationCode:
          authorizationUrl: /authorize
          tokenUrl: /token
          scopes:
            bank-payments:read-limited: Read access to bank payments created by the integration
            bank-payments:write: Write access to bank payments
            chart-of-accounts:read: Read access to chart of accounts
            company-information:read: Read access to company information
            credit-notes:read: Read access to credit notes
            credit-notes:write: Write access to credit notes
            customers:read: Read access to customers
            customers:write: Write access to customers
            fiscal-years:read: Read access to fiscal years
            invoices:read: Read access to invoices
            invoices:write: Write access to invoices
            items:read: Read access to items
            items:write: Write access to items
            journal-entries:read: Read access to journal entries
            journal-entries:write: Write access to journal entries
            sie:read: Read access to SIE files
            supplier-invoices:read: Read access to supplier invoices
            supplier-invoices:write: Write access to supplier invoices
            suppliers:read: Read access to suppliers
            suppliers:write: Write access to suppliers
            tags:read: Read access to tag groups and tags
            tags:write: Write access to tag groups and tags
            uploads:read: Read access to uploads
            uploads:write: Write access to uploads
    client_auth:
      type: http
      scheme: basic
  schemas:
    pagedResponse:
      type: object
      title: pagedResponse
      properties:
        totalItems:
          type: integer
          format: int32
          example: 1
        totalPages:
          type: integer
          format: int32
          example: 1
        currentPage:
          type: integer
          format: int32
          example: 1
    bankgiroRecipient:
      type: object
      properties:
        kind:
          type: string
          enum:
            - bankgiro
        recipientName:
          type: string
          description: Name of the payment recipient
        bankgiroNumber:
          type: string
          description: Bankgiro number (required for Bankgiro payments)
        ocr:
          type: string
          description: OCR reference for the payment. Either `ocr` or `message` must be provided, but not both.
        message:
          type: string
          description: Message for the payment. Either `message` or `ocr` must be provided, but not both.
      required:
        - kind
        - recipientName
        - bankgiroNumber
    transferRecipient:
      type: object
      properties:
        kind:
          type: string
          enum:
            - transfer
        recipientName:
          type: string
          description: Name of the payment recipient
        recipientReference:
          type: string
          description: Reference for the payment recipient
        clearingNumber:
          type: string
          description: Clearing number (required for Transfer payments)
        accountNumber:
          type: string
          description: Account number (required for Transfer payments)
      required:
        - kind
        - recipientName
        - clearingNumber
        - accountNumber
    bank-payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier of the payment
          readOnly: true
        status:
          type: string
          enum:
            - readyToSign
            - onTheWay
            - scheduled
            - paid
            - rejected
            - cancelled
            - error
          description: Current status of the payment
          readOnly: true
        createdDateTime:
          type: string
          format: date-time
          description: Date and time when the payment was created
          readOnly: true
        amount:
          type: number
          format: double
          description: Amount of the payment
        paymentDate:
          type: string
          format: date
          description: Date of the payment
        ownNote:
          type: string
          description: Own note for the payment
        recipientRef:
          description: Payment recipient information
          discriminator:
            propertyName: kind
            mapping:
              bankgiro: "#/components/schemas/bankgiroRecipient"
              transfer: "#/components/schemas/transferRecipient"
          oneOf:
            - $ref: "#/components/schemas/bankgiroRecipient"
            - $ref: "#/components/schemas/transferRecipient"
      example:
        id: 835ba700-b306-4bd9-8447-59207b6b0002
        status: readyToSign
        createdDateTime: 2023-10-01T08:15:00Z
        amount: 1000
        paymentDate: 2023-10-01
        ownNote: "Payment for invoice #12345"
        recipientRef:
          kind: transfer
          recipientName: Property Management Co
          recipientReference: RENT-2025-08
          clearingNumber: "8000"
          accountNumber: "1234567890"
      required:
        - amount
        - paymentDate
        - recipientRef
    apiError:
      type: object
      title: apiError
      properties:
        code:
          type: string
        message:
          type: string
        bokioErrorId:
          type: string
          format: uuid
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    bulk-create-bank-payments-request:
      type: object
      properties:
        payments:
          type: array
          minItems: 1
          maxItems: 100
          description: List of bank payments to create (1-100 items)
          items:
            $ref: "#/components/schemas/bank-payment"
      required:
        - payments
    account:
      type: object
      title: account
      properties:
        account:
          type: integer
          format: int32
          description: The account number
        name:
          type: string
          description: The account name
        accountType:
          type: string
          enum:
            - customAccount
            - basePlanAccount
          description: The type of account (custom or base plan)
      example:
        account: 2610
        name: Företagskonto / Affärskonto
        accountType: basePlanAccount
    accountWithDetails:
      allOf:
        - $ref: "#/components/schemas/account"
        - type: object
          title: accountWithDetails
          properties:
            accountBalance:
              type: number
              format: double
              description: The current balance of the account
              nullable: true
          example:
            account: 1930
            name: Företagskonto / Affärskonto
            accountType: basePlanAccount
            accountBalance: 15000.75
    address:
      type: object
      title: address
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        postalCode:
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
          format: country
      example:
        line1: Delivery Street 15
        line2: Floor 2
        city: Stockholm
        postalCode: 123 45
        country: SE
    companyInformation:
      title: companyInformation
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the company
        companyType:
          type: string
          enum:
            - proprietorship
            - limitedCompany
            - limitedPartnership
            - partnership
            - cooperative
            - nonProfitAssociation
            - communityAssociation
            - religiousCommunity
            - notSet
          description: Company type of the company
        name:
          type: string
          description: Name of the company
        organizationNumber:
          type: string
          description: Organization number of the company
        phone:
          type: string
          description: Phone number of the contact person
        email:
          type: string
          description: Email address of the contact person
        hasBBA:
          type: boolean
          description: Indicates whether the company has a business bank account
        address:
          oneOf:
            - $ref: "#/components/schemas/address"
      example:
        id: 9b408943-7a1e-47ac-85a7-ac52b2c210d3
        companyType: limitedCompany
        name: Company AB
        organizationNumber: 556677-8899
        phone: "+46123456789"
        email: info@example.com
        hasBBA: true
        address:
          line1: Älvsborgsvägen 10
          line2: null
          city: Göteborg
          postalCode: 123 45
          country: SE
    lineItemTaxReduction:
      type: object
      nullable: true
      title: lineItemTaxReduction
      description: |
        Tax reduction details for a line item. Only applicable to line items with productType `services` and unitType `hour` or `unspecified`.
      required:
        - taxReductionType
        - jobType
      properties:
        taxReductionType:
          type: string
          enum:
            - rot
            - rut
          description: The tax reduction type for this line item. Must match the invoice-level taxReduction type.
        jobType:
          type: string
          enum:
            - rotConstruction
            - rotElectricity
            - rotGlassPlate
            - rotSoilWork
            - rotSweeping
            - rotPainting
            - rotPlumbing
            - rutChildServices
            - rutDataITServices
            - rutRemovalServices
            - rutClothingCare
            - rutPersonalHelpCare
            - rutRepair
            - rutSnow
            - rutCleaning
            - rutGardening
            - rutWaterWashingOfTextiles
            - rutFurnishing
            - rutTransportOfHouseholdGoods
            - rutHousingSupervision
          description: |
            The job type categorizing the work. The prefix must match the tax reduction type:
            - ROT types: rotConstruction, rotElectricity, rotGlassPlate, rotSoilWork, rotSweeping, rotPainting, rotPlumbing
            - RUT types: rutChildServices, rutDataITServices, rutRemovalServices, rutClothingCare, rutPersonalHelpCare, rutRepair, rutSnow, rutCleaning, rutGardening, rutWaterWashingOfTextiles, rutFurnishing, rutTransportOfHouseholdGoods, rutHousingSupervision
      example:
        taxReductionType: rot
        jobType: rotConstruction
    salesInvoiceItem:
      type: object
      title: salesItem
      required:
        - description
        - itemType
        - productType
        - quantity
        - unitPrice
        - taxRate
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: Should not be set for new items
        itemRef:
          type: object
          title: itemRef
          nullable: true
          description: |
            Identifier of an existing salesItem to use as a template. Fields itemType and quantity are required. Values in other fields will be overridden by values from this referenced item
          properties:
            id:
              type: string
              format: uuid
              description: Reference to existing salesItem id
              example: 869a69a3-632b-4a09-899e-9dc03342b5dc
            description:
              type: string
              nullable: true
              readOnly: true
        description:
          type: string
        itemType:
          type: string
          enum:
            - salesItem
        productType:
          type: string
          enum:
            - goods
            - services
        unitType:
          type: string
          default: unspecified
          enum:
            - unspecified
            - piece
            - hour
            - day
            - month
            - kilogram
            - gram
            - liter
            - meter
            - centimeter
            - millimeter
            - meterSquared
            - meterCubic
            - mile
            - kilometer
            - gigabyte
            - hectar
            - words
            - year
            - week
            - minute
            - megabyte
            - ton
        quantity:
          type: number
          format: double
          default: 1
        unitPrice:
          type: number
          format: double
        taxRate:
          type: number
          format: double
        bookkeepingAccountNumber:
          type: integer
          nullable: true
          format: int32
          description: Use the `bookkeepingAccountNumber` field in the line items to specify an accounting account other than the account that would be automatically be selected based on the item productType, taxRate, customer and company settings. Accounts that would be automatically selected cannot be set on this field.
        taxReduction:
          type: object
          nullable: true
          allOf:
            - $ref: "#/components/schemas/lineItemTaxReduction"
          description: tax reduction categorization for this line item. When the invoice has a taxReduction, each service line item should specify its job type. The type must match the invoice-level taxReduction type.
      example:
        id: 1
        itemRef:
          id: 55c899c5-82b2-47fa-9c51-e35fc9b26443
          description: Installation work
        description: Installation work
        itemType: salesItem
        productType: services
        unitType: hour
        quantity: 10
        unitPrice: 500
        taxRate: 25
        bookkeepingAccountNumber: 3389
        taxReduction:
          taxReductionType: rot
          jobType: rotConstruction
    descriptionOnlyInvoiceItem:
      type: object
      title: descriptionOnlyItem
      required:
        - description
        - itemType
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: Should not be set for new items
        itemRef:
          type: object
          nullable: true
          description: |
            Identifier of an existing descriptionOnlyItem to use as a template. The field itemType is required.
          properties:
            id:
              type: string
              format: uuid
              description: Reference to existing descriptionOnlyItem id
              example: 55c899c5-82b2-47fa-9c51-e35fc9b26443
            description:
              type: string
              nullable: true
              readOnly: true
        description:
          type: string
        itemType:
          type: string
          enum:
            - descriptionOnlyItem
      example:
        id: 2
        itemRef:
          id: e964435e-50ef-4524-a439-05ff87794952
          description: Custom description line
        description: Custom description line
        itemType: descriptionOnlyItem
    invoiceItem:
      type: object
      title: lineItem
      oneOf:
        - $ref: "#/components/schemas/salesInvoiceItem"
        - $ref: "#/components/schemas/descriptionOnlyInvoiceItem"
    addressWithCountrySubdivision:
      type: object
      title: addressWithCountrySubdivision
      required:
        - line1
        - city
        - postalCode
        - country
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        postalCode:
          type: string
        country:
          description: ISO 3166-1 alpha-2 country code
          type: string
          format: country
        countrySubdivision:
          description: ISO 3166-2 subdivision code (e.g. ENG, SCT, WLS, NIR for GB). Currently required for GB (United kingdom) country.
          type: string
          nullable: true
