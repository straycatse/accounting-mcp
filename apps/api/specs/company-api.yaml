        realEstateNumber:
          type: string
          nullable: true
          description: Required when propertyType is `realEstate`. The real estate designation number.
        tenantOrgNumber:
          type: string
          nullable: true
          description: Required when propertyType is `housingDesignation`. The organisational number of the housing association (BRF).
        apartmentNumber:
          type: string
          nullable: true
          description: Required when propertyType is `housingDesignation`. The apartment number within the housing association.
        deductionAmount:
          type: number
          format: double
          readOnly: true
          description: The total deduction amount calculated from all deduction people.
        status:
          type: string
          readOnly: true
          enum:
            - draft
            - awaitingPayment
            - readyToSubmit
            - submitted
            - removed
            - completed
          description: The current status of the tax reduction.
        deductionPeople:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/invoiceTaxReductionDeductionPerson"
