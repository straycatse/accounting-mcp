    tagGroup:
      type: object
      title: tagGroup
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier of the tag group
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name:
          type: string
          description: Name of the tag group
          example: Project
        alias:
          type: string
          description: Short alias for quick tagging (max 3 characters, unique per company)
          example: "@"
        dimensionNumber:
          type: integer
          format: int32
          nullable: true
          description: |
            Dimension number for SIE file export/import compatibility.

            Reserved numbers per SIE file format:
            1 = Cost center, 2 = Cost carrier, 6 = Project, 7 = Employee,
            8 = Customer, 9 = Supplier, 10 = Invoice, 20+ = Freely available.
          example: 6
        tags:
          type: array
          readOnly: true
          description: The tags (values) within this tag group
          items:
            $ref: "#/components/schemas/tagValue"
      example:
        id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        name: Project
        alias: "@"
        dimensionNumber: 6
        tags:
          - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
            name: Project Alpha
          - id: c3d4e5f6-a7b8-9012-cdef-123456789012
            name: Project Beta
