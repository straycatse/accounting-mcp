    journalEntryTag:
      type: object
      title: journalEntryTag
      description: |
        A tag applied to a journal entry or transaction.
        References a tag value (AllowedTagTypeValue) within a tag group (TagType).
      properties:
        tagId:
          type: string
          format: uuid
          description: Unique identifier of the tag (value) within the tag group
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
        tagGroupId:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier of the tag group this tag belongs to
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        tagName:
          type: string
          readOnly: true
          description: Display name of the tag
          example: Project Alpha
        tagGroupName:
          type: string
          readOnly: true
          description: Display name of the tag group
          example: Project
        weight:
          type: number
          format: double
          description: |
            Allocation weight between 0 (exclusive) and 1 (inclusive).
            Controls how costs/revenues are split in reports.
            Within a tag group, weights on the same journal entry or transaction must sum to at most 1.
          minimum: 0
          exclusiveMinimum: true
          maximum: 1
          default: 1
          example: 0.5
      required:
        - tagId
        - weight
      example:
        tagId: b2c3d4e5-f6a7-8901-bcde-f12345678901
        tagGroupId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        tagName: Project Alpha
        tagGroupName: Project
        weight: 1
    journalEntryItem:
      type: object
      title: journalEntryItem
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        debit:
          type: number
          format: double
        credit:
          type: number
          format: double
        account:
          type: integer
          format: int32
          example: 1930
        tags:
          type: array
          description: |
            Transaction-level tags applied to this specific line item.
            Tags must be applied either at the transaction level (on individual line items) or at the verification level (on the journal entry), but not both on the same journal entry.
            Within a tag group, weights on the same transaction must sum to at most 1.
          items:
            $ref: "#/components/schemas/journalEntryTag"
      example:
        id: 1
        credit: 0
        debit: 200
        account: 1930
        tags: []
    journalEntry:
      type: object
      title: journalEntry
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
        journalEntryNumber:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: "#/components/schemas/journalEntryItem"
        tags:
          type: array
          description: |
            Verification-level tags applied to the entire journal entry.
            Tags must be applied either at the verification level (on the journal entry) or at the transaction level (on individual line items), but not both on the same journal entry.
            Within a tag group, weights on the same journal entry must sum to at most 1.
          items:
            $ref: "#/components/schemas/journalEntryTag"
        reversingJournalEntryId:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        reversedByJournalEntryId:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
        - items
      example:
        id: a419cf69-db6f-4de9-992c-b1a60942a443
        title: invoice 1234
        journalEntryNumber: V342
        date: 2024-10-10
        items:
          - id: 1
            debit: 200
            credit: 0
            account: 1930
            tags: []
          - id: 2
            debit: 0
            credit: 40
            account: 3011
            tags: []
          - id: 3
            debit: 0
            credit: 160
            account: 2611
            tags: []
        tags: []
    journalEntryTags:
      type: object
      title: journalEntryTags
      description: |
        Model for replacing all tags on a journal entry.
        Either set verification-level tags (using `tags`) or transaction-level tags (using `items[*].tags`), not both.
        To remove all tags, send empty arrays for both fields.
      properties:
        tags:
          type: array
          description: |
            Verification-level tags to apply to the entire journal entry.
            Must be empty if `items` contains entries with tags.
          items:
            $ref: "#/components/schemas/journalEntryTag"
        items:
          type: array
          description: |
            Transaction-level tags to apply to individual line items.
            Must be empty (or not include any items with tags) if `tags` is non-empty.
          items:
            type: object
            title: journalEntryItemTags
            description: Tags to apply to a specific line item of a journal entry.
            properties:
              id:
                type: integer
                format: int64
                description: ID of the journal entry line item (transaction)
                example: 1
              tags:
                type: array
                description: Tags to apply to this line item.
                items:
                  $ref: "#/components/schemas/journalEntryTag"
            required:
              - id
              - tags
      example:
        tags:
          - tagId: b2c3d4e5-f6a7-8901-bcde-f12345678901
            weight: 1
        items: []
    journalEntryComment:
