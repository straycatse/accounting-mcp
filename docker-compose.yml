services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: accounting
      POSTGRES_PASSWORD: accounting
      POSTGRES_DB: accounting_mcp
    ports:
      # 5433 on the host: many dev machines run a native Postgres on 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting -d accounting_mcp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
